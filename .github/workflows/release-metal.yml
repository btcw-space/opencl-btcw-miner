# =============================================================================
# BTCW Metal GPU Miner — macOS Apple Silicon Release Workflow
# =============================================================================
# Builds the Metal miner for macOS arm64 on version tags ending in -metal
# (e.g. v26.5.6-metal) and creates a draft GitHub Release.
# Does NOT interfere with the OpenCL release workflow (release.yml).
# =============================================================================

name: "Build & Release (Metal)"

on:
  push:
    tags:
      - 'v*-metal'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # macOS Apple Silicon — Metal GPU Miner
  # ---------------------------------------------------------------------------
  build-macos-metal:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (for Metal compiler)
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Metal compiler
        run: xcrun -sdk macosx metal --version

      - name: Build Metal miner
        run: |
          chmod +x build_macos_metal.sh
          ./build_macos_metal.sh

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="BTCW_METAL_MINER_${TAG}_macos_arm64.tar.gz"
          tar -czf "${ARCHIVE}" -C release .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: metal-macos-arm64
          path: ${{ env.ARCHIVE }}

  # ---------------------------------------------------------------------------
  # Create GitHub Release (draft)
  # ---------------------------------------------------------------------------
  release:
    needs: [build-macos-metal]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "BTCW Metal GPU Miner ${{ github.ref_name }}"
          body: |
            ## BTCW Metal GPU Miner — macOS Apple Silicon

            Native Metal port of the BTCW GPU miner for Apple Silicon Macs (M1/M2/M3/M4).
            Uses Metal Shading Language with zero-copy unified memory for optimal performance.

            ### Requirements
            - macOS 12+ (Monterey or later)
            - Apple Silicon Mac (M1, M2, M3, M4)
            - BTCW node running with `generate` active

            ### Usage
            ```
            tar -xzf BTCW_METAL_MINER_*.tar.gz
            ./btcw_metal_miner [gpu_number] [work_size]
            ```

            ### Performance
            - M1: ~2.10 MH/s (5.4x faster than OpenCL on same hardware)
          files: artifacts/*
